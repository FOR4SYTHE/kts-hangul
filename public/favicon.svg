<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 1. Cartoonish 3D Offset Shadow -->
  <circle cx="36" cy="36" r="22" fill="#000000" />

  <!-- 2. Thick Black Outer Button Ring -->
  <circle cx="28" cy="28" r="22" fill="#000000" />

  <!-- 3. Dynamic Taegeukgi Red/Blue Core (With a Clean 30° Tilt) -->
  <g transform="translate(28, 28) rotate(-30)">
    <!-- Blue Base Half -->
    <circle cx="0" cy="0" r="18.5" fill="#0047A0" />
    <!-- Red S-Curve Lobe Split -->
    <path d="M -18.5,0 A 18.5,18.5 0 0,1 18.5,0 A 9.25,9.25 0 0,0 0,0 A 9.25,9.25 0 0,0 -18.5,0" fill="#CD2E3A" />
  </g>

  <!-- 4. Premium Geometric Lotus Motif (Clean, Non-Overlapping) -->
  <g transform="translate(28, 28)">
    <!-- Hollow Center Ring -->
    <circle cx="0" cy="0" r="2.5" fill="none" stroke="#FFFFFF" stroke-width="1.5" />
    
    <!-- 8 Distinct, Non-Overlapping Petal Loops -->
    <defs>
      <g id="petal">
        <!-- Mathematically plots from the center ring, out to a 3.5px radius cap, and back -->
        <path d="M -0.9 -2.3 L -3.5 -11.5 A 3.5 3.5 0 1 1 3.5 -11.5 L 0.9 -2.3" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      </g>
    </defs>
    
    <!-- Symmetric Radial Array -->
    <use href="#petal" />
    <use href="#petal" transform="rotate(45)" />
    <use href="#petal" transform="rotate(90)" />
    <use href="#petal" transform="rotate(135)" />
    <use href="#petal" transform="rotate(180)" />
    <use href="#petal" transform="rotate(225)" />
    <use href="#petal" transform="rotate(270)" />
    <use href="#petal" transform="rotate(315)" />
  </g>
</svg>
